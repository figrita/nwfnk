<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Funk & New Wave Guitar Scales</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;1,9..144,400&family=IBM+Plex+Mono:wght@400;500;600&family=Libre+Franklin:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #F7F2EB;
    --bg-warm: #EFE8DD;
    --bg-card: #FFFFFF;
    --bg-card-hover: #FDFBF8;
    --root-color: #A63D2F;
    --tone-color: #4A8B72;
    --chord-hl: #C17D1A;
    --seafoam: #5A9E84;
    --tortoise: #6B3A2A;
    --text-primary: #2C1810;
    --text-secondary: #5C4A3E;
    --text-tertiary: #94857A;
    --border: #D9CCBF;
    --border-light: #E8DED3;
    --fretboard-bg: #3B2A1E;
    --font-display: 'Fraunces', serif;
    --font-body: 'Libre Franklin', sans-serif;
    --font-mono: 'IBM Plex Mono', monospace;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text-primary);
    font-family: var(--font-body);
    min-height: 100vh;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
  }
  .page { width: 100%; max-width: 1200px; margin: 0 auto; padding: 16px 28px 0; }

  .top-bar { display: flex; align-items: baseline; justify-content: space-between; flex-wrap: wrap; gap: 12px; margin-bottom: 10px; border-bottom: 2px solid var(--tortoise); padding-bottom: 10px; border-image: linear-gradient(90deg, var(--tortoise), var(--chord-hl)) 1; }
  .top-bar h1 { font-family: var(--font-display); font-size: 34px; font-weight: 400; color: var(--text-primary); letter-spacing: -0.5px; margin: auto 12px;}
  .top-bar h1 em { font-style: italic; color: var(--tortoise); }
  .top-bar .tuning { font-family: var(--font-mono); font-size: 12px; color: var(--text-tertiary); letter-spacing: 1px; text-align: right; }
  .top-bar .root-select {
    font-family: var(--font-mono); font-size: 13px; font-weight: 600;
    padding: 4px 10px; border-radius: 5px; border: 1.5px solid var(--border);
    background: var(--bg-warm); color: var(--tortoise); cursor: pointer;
    letter-spacing: 0.5px;
  }
  .top-bar .root-select:focus { outline: none; border-color: var(--tortoise); }
  .capo-wrap {
    display: inline-flex; align-items: center; gap: 6px;
  }
  .capo-wrap label {
    font-family: var(--font-mono); font-size: 11px; letter-spacing: 1px;
    text-transform: uppercase; color: var(--text-tertiary);
  }
  .capo-btn {
    font-family: var(--font-mono); font-size: 14px; font-weight: 600;
    width: 24px; height: 24px; border-radius: 5px; border: 1.5px solid var(--border);
    background: var(--bg-warm); color: var(--tortoise); cursor: pointer;
    display: flex; align-items: center; justify-content: center; padding: 0;
    line-height: 1; transition: border-color 0.15s;
  }
  .capo-btn:hover { border-color: var(--tortoise); }
  .capo-val {
    font-family: var(--font-mono); font-size: 13px; font-weight: 600;
    color: var(--text-primary); min-width: 32px; text-align: center;
  }
  .capo-val.negative { color: #8B5A3A; }
  .capo-val.positive { color: var(--seafoam); }
  .drop-select {
    font-family: var(--font-mono); font-size: 12px; font-weight: 600;
    padding: 3px 6px; border-radius: 5px; border: 1.5px solid var(--border);
    background: var(--bg-warm); color: var(--text-tertiary); cursor: pointer;
    letter-spacing: 0.5px;
  }
  .drop-select:focus { outline: none; border-color: var(--tortoise); }
  .drop-select.active { color: var(--tortoise); border-color: var(--tortoise); }

  .sf-wrap {
    display: inline-flex; align-items: center; gap: 6px;
    cursor: pointer; user-select: none;
  }
  .sf-symbol {
    font-family: var(--font-mono); font-size: 22px; font-weight: 700;
    line-height: 1; color: var(--border); transition: color 0.2s;
  }
  .sf-symbol.active { color: var(--tortoise); }
  .sf-track {
    width: 28px; height: 14px; border-radius: 7px;
    background: var(--border); position: relative;
    flex-shrink: 0;
  }
  .sf-knob {
    width: 12px; height: 12px; border-radius: 50%;
    background: var(--chord-hl);
    position: absolute; top: 1px;
    transition: left 0.2s ease;
  }
  .sf-knob.sharp { left: 15px; }
  .sf-knob.flat  { left: 1px; }

  .tabs { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 10px; }
  .tab {
    padding: 5px 14px; font-family: var(--font-body); font-size: 13px; font-weight: 500;
    border-radius: 6px; border: 1.5px solid var(--border); background: transparent;
    color: var(--text-secondary); cursor: pointer; transition: all 0.15s ease;
  }
  .tab:hover { color: var(--text-primary); border-color: var(--tortoise); background: var(--bg-warm); }
  .tab.active { background: var(--tortoise); color: #FFF8F0; border-color: var(--tortoise); box-shadow: 0 2px 0 0 var(--chord-hl); }

  .scale-info { display: flex; align-items: baseline; gap: 12px; flex-wrap: wrap; margin-bottom: 2px; }
  .scale-name { font-family: var(--font-display); font-size: 18px; font-weight: 400; }
  .scale-genre { font-family: var(--font-mono); font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--chord-hl); font-weight: 600; }
  .scale-desc { font-size: 13px; color: var(--text-secondary); line-height: 1.5; margin-bottom: 8px; }

  .legend { display: flex; align-items: center; gap: 14px; flex-wrap: wrap; margin-bottom: 6px; }
  .legend-item { display: flex; align-items: center; gap: 5px; font-size: 12px; color: var(--text-secondary); }
  .legend-dot { width: 8px; height: 8px; border-radius: 50%; }
  .legend-dot.root  { background: var(--root-color); }
  .legend-dot.tone  { background: var(--tone-color); }
  .legend-dot.chord-hl { background: var(--chord-hl); }
  .legend-notes { font-family: var(--font-mono); font-size: 12px; color: var(--text-tertiary); }
  .legend .hint { font-size: 12px; color: var(--text-tertiary); font-style: italic; margin-left: auto; }

  .fretboard-wrap { background: var(--fretboard-bg); border-radius: 8px; padding: 14px 16px 8px; overflow-x: auto; margin-bottom: 8px; }

  .pos-bar { display: flex; gap: 4px; flex-wrap: wrap; margin-bottom: 8px; align-items: center; }
  .pos-bar-label {
    font-family: var(--font-mono); font-size: 10px; font-weight: 600;
    text-transform: uppercase; letter-spacing: 1.5px; color: var(--text-tertiary); margin-right: 4px;
  }
  .pos-btn {
    font-family: var(--font-mono); font-size: 11px; font-weight: 500;
    padding: 3px 10px; border-radius: 5px; border: 1.5px solid var(--border);
    background: transparent; color: var(--text-tertiary); cursor: pointer;
    transition: all 0.15s;
  }
  .pos-btn:hover { border-color: var(--tortoise); color: var(--text-secondary); }
  .pos-btn.active { background: var(--tortoise); color: #FFF8F0; border-color: var(--tortoise); box-shadow: 0 2px 0 0 var(--chord-hl); }
  .pos-btn .pos-frets {
    font-size: 9px; color: var(--text-tertiary); margin-left: 3px; font-weight: 400;
  }
  .pos-btn.active .pos-frets { color: rgba(255,248,240,0.6); }

  .chords-strip { width: 100%; padding: 8px 28px 16px; }
  .chords-strip-label { font-family: var(--font-mono); font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 2px; color: var(--text-tertiary); margin-bottom: 4px; }
  .chord-grid { display: flex; flex-direction: column; gap: 6px; }
  .chord-row { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 4px; }
  .chord-row::-webkit-scrollbar { height: 4px; }
  .chord-row::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .chord-card {
    background: var(--bg-card); border: 1.5px solid var(--border); border-radius: 8px;
    padding: 10px 12px 8px; transition: border-color 0.15s, background 0.15s; cursor: default;
    width: 200px; flex: 0 0 200px;
  }
  .chord-card:hover { border-color: #B8A898; background: var(--bg-card-hover); }
  .chord-card.highlight { border-color: var(--chord-hl) !important; background: #FFFCF5; }
  .cc-top { display: flex; align-items: center; gap: 6px; margin-bottom: 1px; }
  .cc-numeral { font-family: var(--font-mono); font-size: 10px; font-weight: 600; color: var(--chord-hl); background: rgba(193,125,26,0.1); padding: 1px 6px; border-radius: 3px; }
  .chord-name  { font-family: var(--font-display); font-size: 15px; font-weight: 600; color: var(--text-primary); }
  .chord-quality { font-size: 10px; color: var(--text-tertiary); margin-bottom: 4px; }
  .chord-desc  { font-size: 11px; color: var(--text-secondary); line-height: 1.4; margin-top: 6px; padding-top: 6px; border-top: 1px solid var(--border-light); }

  .pos-tabs { display: flex; gap: 3px; flex-wrap: wrap; margin-bottom: 6px; }
  .pos-tab {
    font-family: var(--font-mono); font-size: 10px; font-weight: 500;
    padding: 2px 7px; border-radius: 3px; border: 1px solid var(--border);
    background: transparent; color: var(--text-tertiary); cursor: pointer; transition: all 0.12s;
  }
  .pos-tab:hover { color: var(--text-secondary); border-color: #B8A898; }
  .pos-tab.active { background: var(--seafoam); color: #fff; border-color: var(--seafoam); }

  .pos-diagram-wrap { display: flex; flex-direction: column; align-items: center; }
  .diagram-svg-slot { display: flex; justify-content: center; }
  .diagram-svg-slot svg { display: block; }
  .pos-sublabel { font-family: var(--font-mono); font-size: 10px; letter-spacing: 1px; text-transform: uppercase; color: var(--text-tertiary); text-align: center; margin-top: 2px; }

  /* Interval toggle */
  .legend-toggle {
    font-family: var(--font-mono); font-size: 11px; font-weight: 500;
    padding: 3px 10px; border-radius: 5px; border: 1.5px solid var(--border);
    background: transparent; color: var(--text-tertiary); cursor: pointer;
    transition: all 0.15s; letter-spacing: 0.5px;
  }
  .legend-toggle:hover { border-color: var(--tortoise); color: var(--text-secondary); }
  .legend-toggle.active { background: var(--tortoise); color: #FFF8F0; border-color: var(--tortoise); }

  /* Progression builder */
  .prog-strip {
    background: var(--bg-warm); border: 1.5px solid var(--border); border-radius: 8px;
    padding: 10px 14px; margin-bottom: 10px; min-height: 44px;
  }
  .prog-header { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; }
  .prog-label {
    font-family: var(--font-mono); font-size: 10px; font-weight: 600;
    text-transform: uppercase; letter-spacing: 2px; color: var(--text-tertiary);
  }
  .prog-clear {
    font-family: var(--font-mono); font-size: 10px;
    padding: 2px 8px; border-radius: 4px; border: 1px solid var(--border);
    background: transparent; color: var(--text-tertiary); cursor: pointer;
    transition: all 0.12s;
  }
  .prog-clear:hover { border-color: var(--root-color); color: var(--root-color); }
  .prog-play {
    font-family: var(--font-mono); font-size: 10px;
    padding: 2px 8px; border-radius: 4px; border: 1px solid var(--border);
    background: transparent; color: var(--text-tertiary); cursor: pointer;
    transition: all 0.12s;
  }
  .prog-play:hover { border-color: var(--seafoam); color: var(--seafoam); }
  .prog-chips { display: flex; gap: 6px; flex-wrap: wrap; }
  .prog-chip {
    font-family: var(--font-mono); font-size: 12px; font-weight: 500;
    padding: 4px 10px; border-radius: 5px;
    background: var(--bg-card); border: 1.5px solid var(--border);
    color: var(--text-primary); cursor: pointer; transition: all 0.12s; user-select: none;
    display: flex; align-items: center; gap: 6px;
  }
  .prog-chip:hover { border-color: var(--root-color); }
  .prog-chip .prog-num {
    font-size: 10px; color: var(--chord-hl); font-weight: 600;
  }
  .prog-chip .prog-x {
    font-size: 12px; color: var(--text-tertiary); margin-left: 2px;
    cursor: pointer; padding: 2px 4px; border-radius: 3px;
    transition: all 0.12s; line-height: 1;
  }
  .prog-chip .prog-x:hover { color: var(--root-color); background: rgba(166,61,47,0.1); }
  .prog-chip .prog-pos {
    font-size: 9px; color: var(--text-tertiary); font-weight: 400;
  }
  .prog-chip:hover { border-color: var(--seafoam); background: var(--bg-card-hover); }
  .prog-chip[draggable="true"] { cursor: grab; }
  .prog-chip.dragging { opacity: 0.3; }
  .prog-chip.drag-over-left { box-shadow: -3px 0 0 0 var(--seafoam); }
  .prog-chip.drag-over-right { box-shadow: 3px 0 0 0 var(--seafoam); }
  .prog-chip.active-chord { border-color: var(--seafoam); background: rgba(90,158,132,0.12); box-shadow: 0 0 0 2px rgba(90,158,132,0.25); }
  .prog-peek {
    display: none; position: fixed; z-index: 900;
    background: #FFFDF8; border: 1.5px solid var(--border); border-radius: 8px;
    padding: 8px 10px 6px; box-shadow: 0 6px 20px rgba(44,24,16,0.12);
    pointer-events: none; flex-direction: column; align-items: center;
  }
  .prog-peek.visible { display: flex; }
  .prog-peek-label {
    font-family: var(--font-mono); font-size: 10px; color: var(--text-tertiary);
    letter-spacing: 1px; text-transform: uppercase; margin-top: 2px;
  }
  .prog-tempo {
    display: flex; align-items: center; gap: 8px; margin-left: auto;
  }
  .prog-tempo select {
    font-family: var(--font-mono); font-size: 12px; font-weight: 600;
    padding: 2px 6px; border-radius: 4px; border: 1.5px solid var(--border);
    background: var(--bg-card); color: var(--text-primary); cursor: pointer;
  }
  .prog-tempo select:focus { outline: none; border-color: var(--tortoise); }
  .prog-tempo label {
    font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.5px;
    color: var(--text-tertiary); text-transform: uppercase;
  }
  .bpm-widget {
    display: flex; align-items: stretch; height: 28px;
    border: 1.5px solid var(--border); border-radius: 6px; overflow: hidden;
    background: var(--bg-card);
  }
  .bpm-btn {
    display: flex; align-items: center; justify-content: center;
    width: 24px; border: none; background: var(--bg-warm);
    color: var(--tortoise); font-size: 16px; font-weight: 700;
    cursor: pointer; user-select: none; transition: all 0.1s;
    font-family: var(--font-mono); line-height: 1; padding: 0;
  }
  .bpm-btn:hover { background: var(--tortoise); color: var(--bg-warm); }
  .bpm-btn:active { transform: scale(0.92); }
  .bpm-center {
    display: flex; align-items: center; justify-content: center;
    padding: 0 8px; min-width: 42px;
    border-left: 1px solid var(--border-light);
    border-right: 1px solid var(--border-light);
  }
  .bpm-value {
    font-family: var(--font-mono); font-size: 14px; font-weight: 800;
    color: var(--chord-hl); line-height: 1; letter-spacing: -0.5px;
  }
  .prog-strum {
    display: flex; align-items: stretch; gap: 0;
    border: 1.5px solid var(--border); border-radius: 6px; overflow: hidden;
    width: fit-content; margin-left: auto;
  }
  .strum-beat {
    display: flex; flex-direction: column; align-items: center;
    min-width: 36px; border-right: 1px solid var(--border-light);
  }
  .strum-beat:last-child { border-right: none; }
  .strum-beat-num {
    font-family: var(--font-mono); font-size: 9px; font-weight: 700;
    color: var(--chord-hl); padding: 3px 0 2px;
    background: var(--bg-warm); width: 100%; text-align: center;
    border-bottom: 1px solid var(--border-light);
  }
  .strum-beat-checks {
    display: flex; align-items: center;
    gap: 4px; padding: 3px 4px;
  }
  .strum-toggle {
    display: flex; align-items: center; gap: 1px; cursor: pointer;
    font-family: var(--font-mono); font-size: 10px; font-weight: 700;
    color: var(--text-tertiary); user-select: none; line-height: 1;
  }
  .strum-toggle input[type="checkbox"] {
    width: 12px; height: 12px; margin: 0; cursor: pointer;
    accent-color: var(--tortoise);
  }
  .strum-toggle input[type="checkbox"]:checked + span { color: var(--chord-hl); }
  .prog-play.playing {
    border-color: var(--seafoam); color: var(--seafoam); background: rgba(90,158,132,0.08);
  }
  .prog-loop {
    font-family: var(--font-mono); font-size: 10px;
    padding: 2px 8px; border-radius: 4px; border: 1px solid var(--border);
    background: transparent; color: var(--text-tertiary); cursor: pointer;
    transition: all 0.12s;
  }
  .prog-loop.active {
    border-color: var(--tortoise); color: var(--tortoise); background: rgba(107,58,42,0.08);
  }
  .prog-loop:hover { border-color: var(--tortoise); color: var(--tortoise); }

  /* Drum machine */
  .drum-section {
    margin-top: 8px; border-top: 1px solid var(--border-light); padding-top: 8px;
  }
  .drum-header {
    display: flex; align-items: center; gap: 8px; margin-bottom: 6px;
  }
  .drum-toggle {
    font-family: var(--font-mono); font-size: 10px;
    padding: 2px 8px; border-radius: 4px; border: 1px solid var(--border);
    background: transparent; color: var(--text-tertiary); cursor: pointer;
    transition: all 0.12s;
  }
  .drum-toggle.active {
    border-color: var(--tortoise); color: var(--tortoise); background: rgba(107,58,42,0.08);
  }
  .drum-toggle:hover { border-color: var(--tortoise); color: var(--tortoise); }
  .drum-grid {
    display: grid; gap: 2px;
    grid-template-columns: 28px repeat(16, 1fr);
  }
  .drum-label {
    font-family: var(--font-mono); font-size: 8px; font-weight: 700;
    color: var(--text-tertiary); text-transform: uppercase; letter-spacing: 0.5px;
    display: flex; align-items: center; justify-content: flex-end;
    padding-right: 4px; line-height: 1; user-select: none;
  }
  .drum-step {
    aspect-ratio: 1.2; border-radius: 3px; cursor: pointer;
    border: 1px solid var(--border-light); background: var(--bg-card);
    transition: all 0.06s; min-height: 14px;
  }
  .drum-step:hover { border-color: var(--text-tertiary); transform: scale(1.1); }
  .drum-step.beat-start { border-left: 1.5px solid var(--border); }
  .drum-step.on.kick { background: var(--root-color); border-color: var(--root-color); }
  .drum-step.on.snare { background: var(--tortoise); border-color: var(--tortoise); }
  .drum-step.on.hh { background: var(--seafoam); border-color: var(--seafoam); }
  .drum-step.on.oh { background: var(--chord-hl); border-color: var(--chord-hl); }
  .drum-step.step-active { box-shadow: 0 0 0 2px rgba(90,158,132,0.5); }
  .drum-beat-nums {
    display: contents;
  }
  .drum-beat-num {
    font-family: var(--font-mono); font-size: 7px; font-weight: 700;
    color: var(--border); text-align: center; line-height: 1; padding-bottom: 1px;
  }
  .drum-beat-num.beat-start { color: var(--chord-hl); }

  .prog-empty {
    font-size: 12px; color: var(--text-tertiary); font-style: italic;
  }

  /* Sound feedback */
  .chord-card .cc-add {
    font-family: var(--font-mono); font-size: 10px;
    padding: 2px 7px; border-radius: 3px; border: 1px solid var(--border);
    background: transparent; color: var(--text-tertiary); cursor: pointer;
    transition: all 0.12s; margin-left: auto;
  }
  .chord-card .cc-add:hover { border-color: var(--seafoam); color: var(--seafoam); }
  .chord-card .cc-play {
    font-family: var(--font-mono); font-size: 10px;
    padding: 2px 7px; border-radius: 3px; border: 1px solid var(--border);
    background: transparent; color: var(--text-tertiary); cursor: pointer;
    transition: all 0.12s;
  }
  .chord-card .cc-play:hover { border-color: var(--seafoam); color: var(--seafoam); }
  .note-dot { cursor: pointer; }

  .note-tooltip { display: none; position: fixed; z-index: 1000; background: #FFFDF8; border: 1.5px solid var(--border); border-radius: 8px; padding: 12px 16px; pointer-events: none; box-shadow: 0 6px 20px rgba(44,24,16,0.12); min-width: 200px; max-width: 320px; }
  .note-tooltip.visible { display: block; }
  .tt-header { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; padding-bottom: 8px; border-bottom: 1px solid var(--border-light); }
  .tt-note { font-family: var(--font-display); font-size: 22px; color: var(--text-primary); line-height: 1; }
  .tt-degree { font-family: var(--font-mono); font-size: 13px; font-weight: 500; color: var(--tortoise); background: rgba(107,58,42,0.08); padding: 2px 10px; border-radius: 4px; }
  .tt-root-badge { font-family: var(--font-mono); font-size: 10px; letter-spacing: 1px; text-transform: uppercase; color: var(--root-color); }
  .tt-label { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 1.5px; color: var(--text-tertiary); margin-bottom: 6px; }
  .tt-chord { font-size: 13px; color: var(--text-primary); padding: 3px 0; display: flex; justify-content: space-between; align-items: center; gap: 12px; }

//  AUDIO ENGINE
// ══════════════════════════════════════════════════════

var audioCtx = null;
const OPEN_MIDI_ABS = [40, 45, 50, 55, 59, 64]; // E2 A2 D3 G3 B3 E4

function ensureAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}

function midiToFreq(midi) { return 440 * Math.pow(2, (midi - 69) / 12); }

function fretToMidi(s, f) {
  var detuning = capoFret < 0 ? capoFret : 0;
  return OPEN_MIDI_ABS[s] + dropOffset(s) + detuning + f;
}

// Karplus-Strong string synthesis — attempt to mimic a plucked nylon-string guitar.
// A short noise burst is fed into a delay line whose length sets the pitch.
// Each trip around the loop the sample is averaged with its neighbour (lowpass)
// and scaled slightly below 1.0 so the note decays naturally.
function playTone(freq, startTime, duration, velocity, dest) {
  var ctx = ensureAudio();
  var t = startTime || ctx.currentTime;
  var dur = duration || 1.6;
  var vel = typeof velocity === 'number' ? velocity : 1.0;
  var sr  = ctx.sampleRate;
  var totalSamples = Math.ceil(sr * dur);

  // Delay-line length sets the fundamental period
  var period = Math.round(sr / freq);
  if (period < 2) period = 2;

  // --- seed: fundamental sine + touch of noise for pluck transient ---
  var buf = new Float32Array(period);
  for (var i = 0; i < period; i++) {
    var phase = i / period;
    var fundamental = Math.sin(2 * Math.PI * phase);
    var noise = (Math.random() * 2 - 1) * 0.2;
    buf[i] = fundamental * 0.8 + noise;
  }

  // One smoothing pass on the seed to tame the noise edge
  var prev = buf[period - 1];
  for (var i = 0; i < period; i++) {
    var tmp = buf[i];
    buf[i] = 0.6 * buf[i] + 0.2 * prev + 0.2 * buf[(i + 1) % period];
    prev = tmp;
  }

  // Decay tuned per-frequency: bass rings longer
  var decay = 0.999 - (freq / 150000);

  // --- render via classic Karplus-Strong (50/50 average) ---
  var out = new Float32Array(totalSamples);
  var idx = 0;

  for (var s = 0; s < totalSamples; s++) {
    var cur = buf[idx];
    out[s] = cur;

    var next = buf[(idx + 1) % period];
    buf[idx] = (cur + next) * 0.5 * decay;

    idx = (idx + 1) % period;
  }

  // --- normalise & apply velocity (lower headroom for chord stacking) ---
  var peak = 0;
  for (var s = 0; s < totalSamples; s++) {
    var abs = out[s] < 0 ? -out[s] : out[s];
    if (abs > peak) peak = abs;
  }
  var gain_scalar = peak > 0 ? (0.15 * vel) / peak : 0;
  for (var s = 0; s < totalSamples; s++) out[s] *= gain_scalar;

  // --- play with gentle high-shelf rolloff for warmth ---
  var abuf = ctx.createBuffer(1, totalSamples, sr);
  abuf.getChannelData(0).set(out);

  var src = ctx.createBufferSource();
  src.buffer = abuf;

  // High-shelf at 2kHz, -4dB — tames sizzle without killing presence
  var shelf = ctx.createBiquadFilter();
  shelf.type = 'highshelf';
  shelf.frequency.value = 2000;
  shelf.gain.value = -4;

  var gain = ctx.createGain();
  gain.gain.setValueAtTime(1, t);
  gain.gain.setValueAtTime(1, t + dur - 0.05);
  gain.gain.linearRampToValueAtTime(0, t + dur);

  src.connect(shelf);
  shelf.connect(gain);
  gain.connect(dest || ctx.destination);
  src.start(t);
  src.stop(t + dur);
}

function playNote(stringIdx, fret) {
  var midi = fretToMidi(stringIdx, fret);
  playTone(midiToFreq(midi));
}

function playChordStrum(assignment) {
  if (!assignment || !assignment.length) return;
  var ctx = ensureAudio();
  var sorted = assignment.slice().sort(function(a, b) { return a.string - b.string; });
  var t = ctx.currentTime;
  for (var i = 0; i < sorted.length; i++) {
    var midi = fretToMidi(sorted[i].string, sorted[i].fret);
    playTone(midiToFreq(midi), t + i * 0.035, 1.2);
  }
}

//  DRUM SYNTHESIS
// ──────────────────────────────────────────────────────

function ensureDrumNoise() {
  if (drumNoiseBuf) return drumNoiseBuf;
  var ctx = ensureAudio(), sr = ctx.sampleRate, len = sr; // 1s
  drumNoiseBuf = ctx.createBuffer(1, len, sr);
  var d = drumNoiseBuf.getChannelData(0);
  for (var i = 0; i < len; i++) d[i] = Math.random() * 2 - 1;
  return drumNoiseBuf;
}

function ensureDrumReverb() {
  if (drumReverbBuf) return drumReverbBuf;
  var ctx = ensureAudio(), sr = ctx.sampleRate, len = Math.floor(sr * 0.6);
  drumReverbBuf = ctx.createBuffer(2, len, sr);
  for (var ch = 0; ch < 2; ch++) {
    var d = drumReverbBuf.getChannelData(ch);
    for (var i = 0; i < len; i++) d[i] = (Math.random() * 2 - 1) * Math.exp(-i / (sr * 0.15));
  }
  return drumReverbBuf;
}

function createDrumBus(dest) {
  var ctx = ensureAudio();
  var input = ctx.createGain();
  input.gain.value = 0.55;

  var comp = ctx.createDynamicsCompressor();
  comp.threshold.value = -16;
  comp.knee.value = 6;
  comp.ratio.value = 6;
  comp.attack.value = 0.002;
  comp.release.value = 0.08;

  var hpf = ctx.createBiquadFilter();
  hpf.type = 'highpass'; hpf.frequency.value = 50;
  var lpf = ctx.createBiquadFilter();
  lpf.type = 'lowpass'; lpf.frequency.value = 13000;

  var dry = ctx.createGain(); dry.gain.value = 0.82;
  var wet = ctx.createGain(); wet.gain.value = 0.18;
  var conv = ctx.createConvolver();
  conv.buffer = ensureDrumReverb();

  input.connect(comp);
  comp.connect(hpf);
  hpf.connect(lpf);
  lpf.connect(dry);
  lpf.connect(conv);
  conv.connect(wet);
  dry.connect(dest);
  wet.connect(dest);

  return input;
}

function synthKick(t, dest) {
  var ctx = ensureAudio();
  var osc = ctx.createOscillator();
  var g = ctx.createGain();
  osc.type = 'sine';
  osc.frequency.setValueAtTime(150, t);
  osc.frequency.exponentialRampToValueAtTime(35, t + 0.08);
  g.gain.setValueAtTime(0.9, t);
  g.gain.exponentialRampToValueAtTime(0.001, t + 0.35);
  osc.connect(g); g.connect(dest);
  osc.start(t); osc.stop(t + 0.35);
  // click transient
  var click = ctx.createOscillator();
  var cg = ctx.createGain();
  click.type = 'square';
  click.frequency.value = 400;
  cg.gain.setValueAtTime(0.3, t);
  cg.gain.exponentialRampToValueAtTime(0.001, t + 0.01);
  click.connect(cg); cg.connect(dest);
  click.start(t); click.stop(t + 0.015);
}

function synthSnare(t, dest) {
  var ctx = ensureAudio();
  // noise body
  var ns = ctx.createBufferSource();
  ns.buffer = ensureDrumNoise();
  ns.playbackRate.value = 1 + Math.random() * 0.02; // slight variation
  var nf = ctx.createBiquadFilter();
  nf.type = 'bandpass'; nf.frequency.value = 3200; nf.Q.value = 0.8;
  var ng = ctx.createGain();
  ng.gain.setValueAtTime(0.55, t);
  ng.gain.exponentialRampToValueAtTime(0.001, t + 0.14);
  ns.connect(nf); nf.connect(ng); ng.connect(dest);
  ns.start(t); ns.stop(t + 0.15);
  // tonal body
  var osc = ctx.createOscillator();
  osc.type = 'sine'; osc.frequency.value = 185;
  var og = ctx.createGain();
  og.gain.setValueAtTime(0.45, t);
  og.gain.exponentialRampToValueAtTime(0.001, t + 0.06);
  osc.connect(og); og.connect(dest);
  osc.start(t); osc.stop(t + 0.07);
}

function synthHH(t, dest) {
  var ctx = ensureAudio();
  var ns = ctx.createBufferSource();
  ns.buffer = ensureDrumNoise();
  ns.playbackRate.value = 1.5 + Math.random() * 0.3;
  var hpf = ctx.createBiquadFilter();
  hpf.type = 'highpass'; hpf.frequency.value = 7500;
  var g = ctx.createGain();
  g.gain.setValueAtTime(0.25, t);
  g.gain.exponentialRampToValueAtTime(0.001, t + 0.04);
  ns.connect(hpf); hpf.connect(g); g.connect(dest);
  ns.start(t); ns.stop(t + 0.05);
}

function synthOH(t, dest) {
  var ctx = ensureAudio();
  var ns = ctx.createBufferSource();
  ns.buffer = ensureDrumNoise();
  ns.playbackRate.value = 1.4 + Math.random() * 0.2;
  var hpf = ctx.createBiquadFilter();
  hpf.type = 'highpass'; hpf.frequency.value = 6000;
  var g = ctx.createGain();
  g.gain.setValueAtTime(0.25, t);
  g.gain.exponentialRampToValueAtTime(0.001, t + 0.2);
  ns.connect(hpf); hpf.connect(g); g.connect(dest);
  ns.start(t); ns.stop(t + 0.22);
}

// Schedule 16 drum steps over one chord's duration
function scheduleDrumAudio(startTime, dest) {
  var beatSec = 60 / progBPM;
  var chordDur = beatSec * progBeats;
  var stepDur = chordDur / 16;
  var synthMap = { kick: synthKick, snare: synthSnare, hh: synthHH, oh: synthOH };
  var keys = ['kick', 'snare', 'hh', 'oh'];
  for (var k = 0; k < keys.length; k++) {
    var row = drumPattern[keys[k]];
    var fn = synthMap[keys[k]];
    for (var s = 0; s < 16; s++) {
      if (row[s]) fn(startTime + s * stepDur, dest);
    }
  }
}

const NOTE_NAMES   = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
const OPEN_MIDI    = [4, 9, 2, 7, 11, 4];
const STRING_NAMES = ['E','A','D','G','B','e'];
const FRET_COUNT   = 17;
var capoFret = 0;
var dropSemitones = 0;  // how many semitones to lower string 0 (e.g. 2 = Drop D)
function dropOffset(s) { return s === 0 ? -dropSemitones : 0; }

function noteClass(n) {
  const map = { Bb:'A#', Db:'C#', Eb:'D#', Gb:'F#', Ab:'G#' };
  return map[n] || n;
}
function noteIdx(n)  { return NOTE_NAMES.indexOf(noteClass(n)); }
function effectiveOpen(si) { return (OPEN_MIDI[si] + dropOffset(si) + capoFret + 120) % 12; }
function noteAtFret(si, f) {
  var detuning = capoFret < 0 ? capoFret : 0;
  return displayNotes()[(OPEN_MIDI[si] + dropOffset(si) + detuning + f + 240) % 12];
}
function notesMatch(a, b)  { return noteClass(a) === noteClass(b); }
function noteInSet(n, set) { return set.some(function(s){ return notesMatch(s, n); }); }

// ── Transposition ──

const SHARP_NOTES = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
const FLAT_NOTES  = ['C','Db','D','Eb','E','F','Gb','G','Ab','A','Bb','B'];
var useSharps = true;
var activeRoot = 'E';
var BASE_ROOT_IDX = noteIdx('E'); // all SCALES data is in E

function displayNotes() {
  return useSharps ? SHARP_NOTES : FLAT_NOTES;
}

function transposeNote(note, semitones) {
  var idx = noteIdx(note);
  if (idx === -1) return note;
  return displayNotes()[(idx + semitones + 120) % 12];
}

function parseChordRoot(name) {
  // Handle slash chords like "A/E"
  var slash = name.indexOf('/');
  var main = slash >= 0 ? name.slice(0, slash) : name;
  var bass = slash >= 0 ? name.slice(slash + 1) : null;

  // Root is 1 char, or 2 if second is # or b
  var root, suffix;
  if (main.length > 1 && (main[1] === '#' || main[1] === 'b')) {
    root = main.slice(0, 2);
    suffix = main.slice(2);
  } else {
    root = main.slice(0, 1);
    suffix = main.slice(1);
  }
  return { root, suffix, bass };
}

function transposeChordName(name, semitones) {
  var p = parseChordRoot(name);
  var newRoot = transposeNote(p.root, semitones);
  var result = newRoot + p.suffix;
  if (p.bass) result += '/' + transposeNote(p.bass, semitones);
  return result;
}

function transposeScale(original, semitones) {
  if (semitones === 0) return original;
  var newRoot = transposeNote(original.root, semitones);
  return {
    id: original.id,
    name: original.name.replace(/^E /, newRoot + ' '),
    genre: original.genre,
    desc: original.desc,
    notes: original.notes.map(function(n) { return transposeNote(n, semitones); }),
    intervals: original.intervals,
    root: newRoot,
    chordSections: original.chordSections.map(function(sec) {
      return {
        title: sec.title,
        chords: sec.chords.map(function(ch) {
          return {
            name: transposeChordName(ch.name, semitones),
            numeral: ch.numeral,
            tones: ch.tones.map(function(t) { return transposeNote(t, semitones); }),
            desc: ch.desc,
            quality: ch.quality,
            shape: ch.shape,
          };
        })
      };
    })
  };
}

function knownToPosition(entry) {
  var strings = entry.slice(0, 6);
  var sublabel = entry[6];
  var assignment = [];
  var playedFrets = [];
  var capoMin = Math.max(0, capoFret);
  
  for (var s = 0; s < 6; s++) {
    if (strings[s] !== 'x') {
      var f = parseInt(strings[s]);
      if (f < capoMin) return null; // Unplayable with current positive capo
      playedFrets.push(f);
      assignment.push({ string: s, fret: f, note: noteAtFret(s, f) });
    }
  }
  
  var minF = playedFrets.length ? Math.min.apply(null, playedFrets) : 0;
  var maxF = playedFrets.length ? Math.max.apply(null, playedFrets) : 0;
  if (maxF > FRET_COUNT) return null;
  
  var dispLabel;
  if (minF <= capoMin) dispLabel = 'Open';
  else dispLabel = 'Fr ' + minF;
  
  return {
    sig: strings.join(','),
    label: dispLabel,
    sublabel: sublabel,
    strings: strings,
    assignment: assignment,
    minFret: minF,
    maxFret: maxF,
  };
}

function generatePositions(chordName, rootNote, shapeName) {
  var templates = SHAPE_TEMPLATES[shapeName];
  if (!templates) return [];
  var rootPc = noteIdx(rootNote);
  if (rootPc === -1) return [];
  var positions = [];

  var capoMin = Math.max(0, capoFret);

  // Inject known voicings (only valid for standard tuning / positive capo)
  if (capoFret >= 0 && dropSemitones === 0) {
    var known = KNOWN_VOICINGS[chordName];
    if (known) {
      for (var ki = 0; ki < known.length; ki++) {
        var kp = knownToPosition(known[ki]);
        if (kp) positions.push(kp);
      }
    }
  }

  for (var t = 0; t < templates.length; t++) {
    var tmpl = templates[t];
    var loStr  = tmpl.ss[0];
    var detuning = capoFret < 0 ? capoFret : 0;
    var openPc = (OPEN_MIDI[loStr] + dropOffset(loStr) + detuning + 240) % 12;

    for (var rootFret = capoMin; rootFret <= FRET_COUNT; rootFret++) {
      if ((openPc + rootFret) % 12 !== rootPc) continue;
      var assignment = [];
      var valid = true;

      for (var i = 0; i < tmpl.ss.length; i++) {
        var s        = tmpl.ss[i];
        var targetPc = (rootPc + tmpl.semis[i]) % 12;
        var openS    = (OPEN_MIDI[s] + dropOffset(s) + detuning + 240) % 12;
        var fret = (targetPc - openS + 12) % 12;
        while (fret < rootFret - tmpl.span) fret += 12;
        if (fret < capoMin) fret += 12;
        if (fret > FRET_COUNT) { valid = false; break; }
        assignment.push({ string: s, fret: fret, note: displayNotes()[targetPc] });
      }
      if (!valid) continue;

      var frets = assignment.map(function(a){ return a.fret; });
      var minF  = Math.min.apply(null, frets);
      var maxF  = Math.max.apply(null, frets);
      if (maxF - minF > tmpl.span) continue;
      if (maxF > FRET_COUNT) continue;
      if (minF < capoMin) continue;

      var strArr = ['x','x','x','x','x','x'];
      for (var j = 0; j < assignment.length; j++) strArr[assignment[j].string] = String(assignment[j].fret);

      var sig = strArr.join(',');
      var dup = false;
      for (var k = 0; k < positions.length; k++) { if (positions[k].sig === sig) { dup = true; break; } }
      if (dup) continue;

      var dispLabel;
      if (minF <= capoMin) dispLabel = 'Open';
      else dispLabel = 'Fr ' + minF;

      positions.push({
        sig: sig,
        label:    dispLabel,
        sublabel: tmpl.label,
        strings:  strArr,
        assignment: assignment,
        minFret: minF,
        maxFret: maxF,
      });
    }
  }

  positions.sort(function(a, b){ return a.minFret - b.minFret; });

  // Remove subset positions
  var dominated = {};
  for (var i = 0; i < positions.length; i++) {
    if (dominated[i]) continue;
    for (var j = 0; j < positions.length; j++) {
      if (i === j || dominated[j]) continue;
      var a = positions[i].strings, b = positions[j].strings;
      var aC = 0, bC = 0;
      for (var s = 0; s < 6; s++) { if (a[s] !== 'x') aC++; if (b[s] !== 'x') bC++; }
      if (aC >= bC) continue;
      var isSub = true;
      for (var s = 0; s < 6; s++) { if (a[s] !== 'x' && a[s] !== b[s]) { isSub = false; break; } }
      if (isSub) dominated[i] = true;
    }
  }
  var filtered = [];
  for (var i = 0; i < positions.length; i++) { if (!dominated[i]) filtered.push(positions[i]); }

  return filtered.slice(0, 9);
}
